<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskSnap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="bg-pattern"></div>

<div class="app-container">

  <div class="header">
    <div class="header-logo">
      <div class="header-logo-icon"><i class="fas fa-clipboard-list"></i></div>
      <h1>TaskSnap</h1>
    </div>
  </div>

  <!-- Nav -->
  <nav class="nav-bar">
    <a href="/"><i class="fas fa-camera-retro"></i> Capture</a>
    <a href="/drafts" class="active"><i class="fas fa-clipboard-list"></i> Drafts</a>
    <a href="/settings"><i class="fas fa-gear"></i> Settings</a>
  </nav>

  <div class="card">
    <div class="card-title">Drafts</div>
    <div class="card-desc">
      Every extraction that hasn't fully synced (or that you left mid-review) stays here — resume it
      to pick up where you left off, or delete it if you don't need it anymore.
    </div>
    <div id="draftsContainer"></div>
  </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<!-- Read-only draft view modal -->
<div class="modal-overlay" id="draftViewModal">
  <div class="modal-box">
    <h3><i class="fas fa-eye"></i> Draft contents</h3>
    <div id="draftViewBody"></div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" id="draftViewClose" type="button">Close</button>
    </div>
  </div>
</div>

<script src="/static/drafts.js"></script>
</body>
</html>
