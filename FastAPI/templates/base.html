<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TaskSnap{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 2rem; }
    .card { max-width: 420px; margin: 4rem auto; padding: 2rem; border: 1px solid #8884; border-radius: 12px; }
    label { display: block; margin-top: 1rem; }
    input, button { font-size: 1rem; padding: 0.5rem; width: 100%; box-sizing: border-box; margin-top: 0.25rem; }
    button { cursor: pointer; margin-top: 1.5rem; }
    .error { color: #c0392b; margin-top: 0.75rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
